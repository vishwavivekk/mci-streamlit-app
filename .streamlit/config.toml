[server]
maxUploadSize = 50
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#00d4ff"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
font = "sans serif"

